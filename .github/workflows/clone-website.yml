name: Clone Website

on:
  repository_dispatch:
    types: [clone-website]

jobs:
  clone:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run website cloner
        run: node scripts/clone-and-deploy.mjs
        env:
          TARGET_URL: ${{ github.event.client_payload.url }}
          DEMO_ID: ${{ github.event.client_payload.demoId }}
          CALLBACK_URL: ${{ github.event.client_payload.callbackUrl }}
          DEMO_CONFIG: ${{ toJSON(github.event.client_payload.demoConfig) }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CLONE_WEBHOOK_SECRET: ${{ secrets.CLONE_WEBHOOK_SECRET }}

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: clone-debug-${{ github.event.client_payload.demoId }}
          path: |
            output/
            screenshots/
          retention-days: 7
